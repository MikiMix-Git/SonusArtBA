<!doctype html>
<!--
  Verzija: 2.18
  Datum: 2026-02-07
  Opis: Rešen problem sa odsecanjem dugačkih specifikacija povećanjem max-height limita.
        Optimizovana čitljivost teksta u opisima i specifikacijama.
        Implementirana interaktivna galerija i unapređeni Lightbox.
-->
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hi‑Fi Audio Proizvodi — V2.18</title>
  
  <style>
    :root {
      --gold: #d6b46a;
      --light-gold: #f0c987;
      --bg-dark: #0b0f14;
      --card-bg: rgba(255, 255, 255, 0.07);
      --input-bg: #1a1f26;
      --text-white: #ffffff;
      --text-gray: #ccc;
    }

    header {
      position: sticky; top: 0; z-index: 1000;
      background-color: var(--bg-dark);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      padding: 1.5rem 1rem;
      border-bottom: 1px solid rgba(214, 180, 106, 0.2);
    }

    body {
      margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark); color: #eee; min-height: 100vh;
      background: radial-gradient(1200px 700px at 12% 8%, rgba(214,180,106,.16), transparent 55%),
                  radial-gradient(900px 600px at 88% 12%, rgba(126,230,215,.14), transparent 60%),
                  linear-gradient(180deg, #0b0f14, #0e151c);
      background-attachment: fixed;
    }

    h1 { font-weight: 700; font-size: clamp(1.5rem, 5vw, 2.5rem); margin: 0 0 1rem 0; color: var(--gold); text-align: center; }

    .filters { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    
    input[type="search"], select { 
      padding: 0.7rem 1rem; 
      border-radius: 8px; 
      border: 1px solid rgba(214, 180, 106, 0.4); 
      background-color: var(--input-bg); 
      color: var(--text-white); 
      font-size: 0.95rem; 
      min-width: 200px; 
      outline: none; 
      transition: border-color 0.2s;
    }
    
    input[type="search"]:focus, select:focus {
      border-color: var(--gold);
    }

    #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem; padding: 2rem 1rem; max-width: 1400px; margin: 0 auto; }

    article.product {
      background: var(--card-bg); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; position: relative; overflow: hidden; 
    }
    article.product:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); border-color: rgba(214, 180, 106, 0.3); }

    .product-logo { height: 40px; margin-bottom: 1.2rem; display: flex; align-items: center; }
    .product-logo img { max-height: 100%; max-width: 150px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.8; }

    .gallery-container { margin-bottom: 1.5rem; }
    .main-image-container { background: white; border-radius: 12px; height: 220px; display: flex; align-items: center; justify-content: center; padding: 15px; cursor: pointer; overflow: hidden; }
    .main-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s ease; }

    .thumbnails { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: thin; scrollbar-color: var(--gold) transparent; }
    .thumbnails img { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 4px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
    .thumbnails img.active { border-color: var(--gold); }

    .product-name { font-size: 1.25rem; color: var(--gold); margin: 0.5rem 0; line-height: 1.3; min-height: 3.2rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; color: var(--light-gold); margin-bottom: 1rem; }

    .spec-list { list-style: none; padding: 0; margin: 0; }
    .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.85rem; }
    .spec-label { color: var(--gold); font-weight: 600; margin-right: 15px; text-align: left; }
    .spec-value { text-align: right; color: var(--text-white); font-weight: 400; }

    .expand-btn { background: rgba(214, 180, 106, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 0.7rem; border-radius: 8px; cursor: pointer; margin-top: 1rem; font-size: 0.85rem; font-weight: bold; width: 100%; transition: background 0.2s; }
    .expand-btn:hover { background: rgba(214, 180, 106, 0.2); }

    .content-fold { 
      max-height: 0; 
      overflow: hidden; 
      transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); 
    }
    .content-fold.open { 
      max-height: 4000px; 
      transition: max-height 0.5s ease-in;
      margin-top: 1rem; 
      padding-bottom: 10px; 
    }

    #imageModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 2000; justify-content: center; align-items: center; padding: 20px; user-select: none; }
    #imageModal.open { display: flex; }
    .modal-content { position: relative; max-width: 95%; max-height: 90%; display: flex; align-items: center; justify-content: center; }
    #modalImg { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(214, 180, 106, 0.2); border: 1px solid var(--gold); color: var(--gold); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; z-index: 2010; }
    .modal-nav:hover { background: var(--gold); color: black; }
    .modal-nav.prev { left: -70px; }
    .modal-nav.next { right: -70px; }
    .modal-close { position: absolute; top: -50px; right: 0; color: white; font-size: 2rem; cursor: pointer; }
    .modal-counter { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 0.9rem; }

    @media (max-width: 768px) {
      .modal-nav.prev { left: 10px; }
      .modal-nav.next { right: 10px; }
      .modal-nav { width: 40px; height: 40px; background: rgba(0,0,0,0.5); }
    }

    .loader { text-align: center; padding: 100px; color: var(--gold); font-size: 1.2rem; }
  </style>
</head>
<body>

<header>
  <h1>Hi‑Fi Audio Proizvodi</h1>
  <div class="filters">
    <input type="search" id="q" placeholder="Pretraži modele ili opis..." />
    <select id="brandFilter"><option value="all">Svi brendovi</option></select>
    <select id="typeFilter"><option value="all">Sve kategorije</option></select>
  </div>
</header>

<main id="products">
  <div class="loader">Učitavanje audio kataloga...</div>
</main>

<div id="imageModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-nav prev" onclick="changeLightboxImage(-1)">&#10094;</div>
    <img src="" id="modalImg" alt="Uvećano" />
    <div class="modal-nav next" onclick="changeLightboxImage(1)">&#10095;</div>
    <div class="modal-counter" id="modalCounter">1 / 1</div>
  </div>
</div>

<script>
  const BASE_URL = "https://raw.githubusercontent.com/MikiMix-Git/SonusArtBA/main/json/";
  const FILES = [
    "argon_audio_products_all_categories.json", "bowers_wilkins_products.json",
    "denon_products.json", "dynaudio_products.json",
    "marantz_all_products.json", "polkaudio_products.json", "qacoustics_products.json"
  ];

  let ALL_PRODUCTS = [];
  let currentLightboxData = { images: [], index: 0 };
  const productsGrid = document.getElementById('products');

  function formatSpecs(specs) {
    if (!specs || typeof specs !== 'object' || Object.keys(specs).length === 0) 
        return '<p style="padding:10px; color:var(--text-gray);">Specifikacije nisu dostupne.</p>';
    
    let html = '<div class="spec-list">';
    for (const [key, value] of Object.entries(specs)) {
        if (value && value.toString().trim() !== "") {
            html += `<div class="spec-item"><span class="spec-label">${key}</span><span class="spec-value">${value}</span></div>`;
        }
    }
    html += '</div>';
    return html;
  }

  function getBrandName(product, fileName) {
    if (product.brand) return product.brand;
    const name = fileName.split('_')[0];
    return name.charAt(0).toUpperCase() + name.slice(1).replace('audio', ' Audio');
  }

  async function init() {
    try {
      const fetchPromises = FILES.map(async file => {
        const resp = await fetch(BASE_URL + file);
        if (!resp.ok) throw new Error(`Greška: ${file}`);
        const data = await resp.json();
        return data.map((p, idx) => ({ 
          ...p, 
          id: `prod-${file.replace('.json', '')}-${idx}`,
          detectedBrand: getBrandName(p, file) 
        }));
      });
      const results = await Promise.all(fetchPromises);
      ALL_PRODUCTS = results.flat();
      populateFilters();
      render();
    } catch (err) {
      productsGrid.innerHTML = `<div class="loader" style="color:red">Greška pri učitavanju: ${err.message}</div>`;
    }
  }

  function populateFilters() {
    const brands = [...new Set(ALL_PRODUCTS.map(p => p.detectedBrand))].sort();
    const types = [...new Set(ALL_PRODUCTS.map(p => p.kategorije).filter(Boolean))].sort();
    const bSel = document.getElementById('brandFilter');
    const tSel = document.getElementById('typeFilter');
    brands.forEach(b => bSel.add(new Option(b, b)));
    types.forEach(t => tSel.add(new Option(t, t)));
  }

  function render() {
    const q = document.getElementById('q').value.toLowerCase();
    const brand = document.getElementById('brandFilter').value;
    const type = document.getElementById('typeFilter').value;

    const filtered = ALL_PRODUCTS.filter(p => {
      const matchQ = p.ime_proizvoda.toLowerCase().includes(q) || (p.opis && p.opis.toLowerCase().includes(q));
      const matchB = brand === 'all' || p.detectedBrand === brand;
      const matchT = type === 'all' || p.kategorije === type;
      return matchQ && matchB && matchT;
    });

    productsGrid.innerHTML = filtered.map(p => {
      const images = p.url_slika || [];
      const hasGallery = images.length > 1;

      return `
      <article class="product" id="${p.id}">
        <div class="product-logo">
          ${p.brend_logo_url ? `<img src="${p.brend_logo_url}" alt="${p.detectedBrand}">` : `<span style="color:var(--gold);font-weight:bold">${p.detectedBrand}</span>`}
        </div>

        <div class="gallery-container">
          <div class="main-image-container" onclick="openLightbox('${p.id}')">
            <img src="${images[0] || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                 class="main-img" 
                 alt="${p.ime_proizvoda}" 
                 loading="lazy">
          </div>
          ${hasGallery ? `
            <div class="thumbnails">
              ${images.map((img, i) => `
                <img src="${img}" 
                     class="${i === 0 ? 'active' : ''}" 
                     onclick="switchImage('${p.id}', '${img}', this)"
                     alt="Sličica ${i+1}">
              `).join('')}
            </div>
          ` : ''}
        </div>

        <h2 class="product-name">${p.ime_proizvoda}</h2>
        <div class="product-price">${p.cena || 'Pozovite za cenu'}</div>

        <button class="expand-btn" onclick="toggleFold(this)">Opis Proizvoda ↓</button>
        <div class="content-fold"><p style="font-size:0.95rem; padding:10px 5px; line-height:1.6; color:var(--text-gray)">${p.opis || 'Opis trenutno nije dostupan.'}</p></div>
        
        <button class="expand-btn" onclick="toggleFold(this)">Specifikacije ↓</button>
        <div class="content-fold">${formatSpecs(p.specifikacije)}</div>

        <a href="${p.url_proizvoda}" target="_blank" style="margin-top:auto; color:var(--gold); text-decoration:none; padding-top:1.5rem; font-weight:bold; text-align:center; font-size:0.9rem;">POGLEDAJ NA SAJTU →</a>
      </article>
    `}).join('');
  }

  window.switchImage = (productId, newSrc, thumbElement) => {
    const card = document.getElementById(productId);
    card.querySelector('.main-img').src = newSrc;
    card.querySelectorAll('.thumbnails img').forEach(t => t.classList.remove('active'));
    thumbElement.classList.add('active');
  };

  window.openLightbox = (productId) => {
    const product = ALL_PRODUCTS.find(p => p.id === productId);
    if (!product || !product.url_slika || product.url_slika.length === 0) return;
    const currentSrc = document.getElementById(productId).querySelector('.main-img').src;
    let startIndex = product.url_slika.indexOf(currentSrc);
    if (startIndex === -1) startIndex = 0;
    currentLightboxData = { images: product.url_slika, index: startIndex };
    updateLightboxUI();
    document.getElementById('imageModal').classList.add('open');
  };

  function updateLightboxUI() {
    const img = document.getElementById('modalImg');
    const counter = document.getElementById('modalCounter');
    const { images, index } = currentLightboxData;
    img.src = images[index];
    counter.textContent = `${index + 1} / ${images.length}`;
  }

  window.changeLightboxImage = (step) => {
    const { images, index } = currentLightboxData;
    let newIndex = (index + step + images.length) % images.length;
    currentLightboxData.index = newIndex;
    updateLightboxUI();
  };

  window.closeModal = () => document.getElementById('imageModal').classList.remove('open');

  window.toggleFold = (btn) => {
    const fold = btn.nextElementSibling;
    const isOpen = fold.classList.toggle('open');
    btn.textContent = isOpen ? btn.textContent.replace('↓', '↑') : btn.textContent.replace('↑', '↓');
  };

  document.getElementById('q').oninput = render;
  document.getElementById('brandFilter').onchange = render;
  document.getElementById('typeFilter').onchange = render;
  init();
</script>
</body>
</html>
