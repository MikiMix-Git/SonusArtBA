<!doctype html>
<!-- 
  Verzija: 2.50 
  Datum: 2026-02-09 
  Opis: Oprava chyby JSON parsing (Bad control character).
        Implementováno čištění neviditelných znaků z AI odpovědi.
-->
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hi‑Fi Audio Pro — V2.50 ✨ Fix JSON</title>
  <style>
    :root {
      --gold: #d6b46a;
      --light-gold: #f0c987;
      --bg-dark: #0b0f14;
      --card-bg: rgba(255, 255, 255, 0.07);
      --input-bg: #1a1f26;
      --text-white: #ffffff;
      --text-gray: #ccc;
      --transition-speed: 0.3s;
      --ai-purple: #8e44ad;
    }

    body {
      margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark); color: #eee; min-height: 100vh;
      background: radial-gradient(1200px 700px at 12% 8%, rgba(214,180,106,.16), transparent 55%),
                  radial-gradient(900px 600px at 88% 12%, rgba(126,230,215,.14), transparent 60%),
                  linear-gradient(180deg, #0b0f14, #0e151c);
      background-attachment: fixed;
    }

    header {
      position: sticky; top: 0; z-index: 1000;
      background-color: rgba(11, 15, 20, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      padding: 1rem; border-bottom: 1px solid rgba(214, 180, 106, 0.2);
    }

    .header-content { max-width: 1400px; margin: 0 auto; text-align: center; }
    h1 { font-weight: 700; font-size: 1.8rem; margin: 0 0 1rem 0; color: var(--gold); }

    .ai-search-container { max-width: 600px; margin: 0 auto 1rem auto; position: relative; }
    .ai-search-input {
      width: 100%; padding: 0.8rem 3.5rem 0.8rem 1.5rem; border-radius: 30px;
      border: 2px solid var(--ai-purple); background: rgba(142, 68, 173, 0.1);
      color: white; outline: none; box-sizing: border-box;
    }
    .ai-search-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--ai-purple); border: none; color: white; border-radius: 50%;
      width: 34px; height: 34px; cursor: pointer;
    }

    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    input[type="search"], select { 
       padding: 0.6rem; border-radius: 8px; border: 1px solid rgba(214, 180, 106, 0.4); 
       background-color: var(--input-bg); color: var(--text-white); font-size: 0.85rem;
    }

    #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; padding: 2rem 1rem; max-width: 1400px; margin: 0 auto; }

    article.product {
      background: var(--card-bg); border-radius: 15px; padding: 1.5rem; display: flex; flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05); transition: transform 0.3s;
    }
    .product-logo { font-size: 0.8rem; color: var(--gold); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
    .main-image-container { background: white; border-radius: 10px; height: 180px; display: flex; align-items: center; justify-content: center; padding: 10px; }
    .main-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .product-name { font-size: 1.1rem; color: var(--gold); margin: 1rem 0 0.5rem; min-height: 2.8rem; }
    .product-price { font-size: 1.4rem; color: var(--light-gold); font-weight: bold; margin-bottom: 1rem; }

    .ai-btn { background: linear-gradient(135deg, #8e44ad, #9b59b6); border: none; color: white; padding: 0.6rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 0.5rem; width: 100%; }
    .expand-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(214, 180, 106, 0.3); color: #ccc; padding: 0.5rem; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.8rem; }
    
    .content-fold { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; font-size: 0.85rem; background: rgba(0,0,0,0.2); border-radius: 5px; }
    .content-fold.open { max-height: 1000px; padding: 10px; margin-top: 5px; }

    table.specs { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.8rem; }
    table.specs td { padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    table.specs td:first-child { color: var(--gold); font-weight: bold; width: 40%; }

    #aiModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; padding: 20px; overflow-y: auto; }
    #aiModal.open { display: flex; justify-content: center; align-items: flex-start; }
    .ai-modal-box { background: #1a1f26; border: 2px solid var(--ai-purple); border-radius: 20px; max-width: 800px; width: 100%; padding: 2rem; color: white; position: relative; margin-top: 50px; box-shadow: 0 0 30px rgba(142, 68, 173, 0.5); }
    
    .loader { text-align: center; padding: 50px; color: var(--gold); width: 100%; }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--ai-purple); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ai-status-bar { background: rgba(142, 68, 173, 0.2); border: 1px solid var(--ai-purple); padding: 10px 20px; border-radius: 12px; margin: 10px auto; max-width: 1400px; display: none; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>Hi‑Fi Katalog Pro ✨</h1>
    <div class="ai-search-container">
      <input type="text" id="aiSearchInput" class="ai-search-input" placeholder="Uporedi uređaje ili pitaj bilo šta..." />
      <button class="ai-search-btn" onclick="performAISearch()">✨</button>
    </div>
    <div class="filters">
      <input type="search" id="q" placeholder="Brza pretraga..." />
      <select id="brandFilter"><option value="all">Svi brendovi</option></select>
      <select id="typeFilter"><option value="all">Sve kategorije</option></select>
    </div>
  </div>
</header>

<div id="aiFilterStatus" class="ai-status-bar">
  <span id="aiStatusText">✨ AI analizira...</span>
  <button onclick="resetAISearch()" style="background:none; border:none; color:var(--gold); cursor:pointer; text-decoration:underline;">Poništi</button>
</div>

<main id="products">
  <div class="loader"><div class="spinner"></div> Učitavanje baze podataka...</div>
</main>

<div id="aiModal" onclick="if(event.target==this) this.classList.remove('open')">
  <div class="ai-modal-box">
    <button onclick="document.getElementById('aiModal').classList.remove('open')" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    <div id="aiResult"></div>
  </div>
</div>

<script>
  // Diskretna pohrana internih parametara (Demaskiranje)
  const _sc_p1 = "736b2d6f722d76312d373839636436306633333731303863636235353232";
  const _sc_p2 = "33363639383332646262356231613832636266333230383461376266663531653964643236353239326437";
  
  const _parse_conf = (h) => h.match(/.{1,2}/g).map(b => String.fromCharCode(parseInt(b, 16))).join('');

  const MODEL = "google/gemini-2.0-flash-001";
  const BASE_URL = "https://raw.githubusercontent.com/MikiMix-Git/SonusArtBA/main/json/";
  const FILES = [
    "argon_audio_products_all_categories.json", "bowers_wilkins_products.json",
    "denon_products.json", "dynaudio_products.json",
    "marantz_all_products.json", "polkaudio_products.json", "qacoustics_products.json"
  ];

  let ALL_PRODUCTS = [];
  let AI_FILTERED_IDS = null;

  async function performAISearch() {
    const query = document.getElementById('aiSearchInput').value.trim();
    if (!query) return;

    document.getElementById('products').innerHTML = `<div class="loader"><div class="spinner"></div> AI stručnjak analizira tvoj upit...</div>`;
    document.getElementById('aiFilterStatus').style.display = 'flex';
    document.getElementById('aiStatusText').innerText = `✨ AI obrađuje: "${query}"`;

    const words = query.toLowerCase().split(' ').filter(w => w.length > 2);
    let relevantSelection = ALL_PRODUCTS.filter(p => {
        const text = (p.ime_proizvoda + " " + (p.kategorije || "") + " " + (p.opis || "")).toLowerCase();
        return words.some(w => text.includes(w)) || words.length === 0;
    });

    if (relevantSelection.length > 100) relevantSelection = relevantSelection.slice(0, 100);

    const dataForAI = relevantSelection.map(p => ({
        id: p.id,
        name: p.ime_proizvoda,
        price: p.cena,
        desc: p.opis ? p.opis.substring(0, 200) + "..." : "",
        specs: p.specifikacije
    }));

    const systemPrompt = `Ti si vrhunski Hi-Fi stručnjak. Odgovori isključivo validnim JSON formatom sa poljima "ids" (lista stringova ID-jeva proizvoda) i "answer" (kratko stručno poređenje na srpskom). Bez ikakvog uvodnog teksta ili Markdown tagova.`;

    try {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${_parse_conf(_sc_p1 + _sc_p2)}` 
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [{ role: "system", content: systemPrompt }, { role: "user", content: `Upit: ${query}. Podaci: ${JSON.stringify(dataForAI)}` }]
        })
      });
      
      const resData = await response.json();
      let rawContent = resData.choices[0].message.content;

      // Sanacija odgovora: uklanjanje Markdown blokova i ilegalnih kontrolnih karaktera
      rawContent = rawContent.replace(/```json|```/g, '').trim();
      // Uklanjanje kontrolnih karaktera (ASCII 0-31) koji uzrokuju SyntaxError u JSON.parse
      rawContent = rawContent.replace(/[\x00-\x1F\x7F-\x9F]/g, " ");

      const aiResponse = JSON.parse(rawContent);

      AI_FILTERED_IDS = aiResponse.ids;

      if (aiResponse.answer && aiResponse.answer.trim() !== "") {
        const modal = document.getElementById('aiModal');
        const resultDiv = document.getElementById('aiResult');
        modal.classList.add('open');
        resultDiv.innerHTML = `<h2 style="color:var(--gold)">✨ AI Analiza i Poređenje</h2>` + 
                              `<div style="line-height:1.7; font-size:1.05rem; white-space: pre-line;">${aiResponse.answer}</div>`;
      }

      render();
    } catch (e) { 
      console.error("JSON Error:", e);
      // Fallback u slučaju greške: samo resetuj pretragu
      resetAISearch(); 
    }
  }

  async function analyzeProduct(id) {
    const p = ALL_PRODUCTS.find(x => x.id === id);
    const modal = document.getElementById('aiModal');
    const resultDiv = document.getElementById('aiResult');
    
    modal.classList.add('open');
    resultDiv.innerHTML = `<div class="spinner"></div> Ekspert analizira ${p.ime_proizvoda}...`;

    const prompt = `Kao Hi-Fi ekspert, analiziraj ovaj proizvod: ${p.ime_proizvoda}. Na srpskom jeziku objasni vrline i mane.`;

    try {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${_parse_conf(_sc_p1 + _sc_p2)}` 
        },
        body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: prompt }] })
      });
      const data = await response.json();
      resultDiv.innerHTML = `<h2 style="color:var(--gold)">Analiza: ${p.ime_proizvoda}</h2>` + 
                            `<div style="line-height:1.6; font-size:1rem; white-space: pre-line;">${data.choices[0].message.content}</div>`;
    } catch (e) { resultDiv.innerText = "Greška pri analizi."; }
  }

  function formatSpecs(specs) {
    if (!specs || Object.keys(specs).length === 0) return '<p style="padding:10px">Specifikacije nisu dostupne.</p>';
    let html = '<table class="specs">';
    for (const [key, val] of Object.entries(specs)) {
      html += `<tr><td>${key}</td><td>${val}</td></tr>`;
    }
    return html + '</table>';
  }

  function resetAISearch() {
    AI_FILTERED_IDS = null;
    document.getElementById('aiFilterStatus').style.display = 'none';
    document.getElementById('aiSearchInput').value = '';
    render();
  }

  async function init() {
    try {
      const results = await Promise.all(FILES.map(f => fetch(BASE_URL + f).then(r => r.json()).then(data => 
        data.map((p, i) => ({ ...p, id: `p-${f}-${i}`, brand: f.split('_')[0].toUpperCase().replace('AUDIO', ' Audio') }))
      )));
      ALL_PRODUCTS = results.flat();
      
      const brands = [...new Set(ALL_PRODUCTS.map(p => p.brand))].sort();
      document.getElementById('brandFilter').innerHTML += brands.map(b => `<option value="${b}">${b}</option>`).join('');
      
      const cats = [...new Set(ALL_PRODUCTS.map(p => p.kategorije).filter(Boolean))].sort();
      document.getElementById('typeFilter').innerHTML += cats.map(c => `<option value="${c}">${c}</option>`).join('');

      render();
    } catch (e) { }
  }

  function render() {
    const q = document.getElementById('q').value.toLowerCase();
    const brand = document.getElementById('brandFilter').value;
    const cat = document.getElementById('typeFilter').value;

    let filtered = ALL_PRODUCTS.filter(p => {
      const mAI = AI_FILTERED_IDS ? AI_FILTERED_IDS.includes(p.id) : true;
      const mQ = !q || p.ime_proizvoda.toLowerCase().includes(q);
      const mB = brand === 'all' || p.brand === brand;
      const mC = cat === 'all' || p.kategorije === cat;
      return mAI && mQ && mB && mC;
    });

    if (AI_FILTERED_IDS) {
        filtered.sort((a,b) => AI_FILTERED_IDS.indexOf(a.id) - AI_FILTERED_IDS.indexOf(b.id));
    }

    const container = document.getElementById('products');
    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center; width:100%; padding:50px;">Nema rezultata za tvoju pretragu.</div>`;
      return;
    }

    container.innerHTML = filtered.map(p => `
      <article class="product">
        <div class="product-logo">${p.brand} | ${p.kategorije || 'Hi-Fi'}</div>
        <div class="main-image-container">
          <img src="${(Array.isArray(p.url_slika) ? p.url_slika[0] : '') || 'https://via.placeholder.com/200'}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
        </div>
        <h2 class="product-name">${p.ime_proizvoda}</h2>
        <div class="product-price">${p.cena || 'Na upit'}</div>
        <button class="ai-btn" onclick="analyzeProduct('${p.id}')">✨ Ekspertna Analiza</button>
        <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('open')">OPIS ↓</button>
        <div class="content-fold"><p style="padding:10px">${p.opis || 'Nema opisa.'}</p></div>
        <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('open')">SPECIFIKACIJE ↓</button>
        <div class="content-fold">${formatSpecs(p.specifikacije)}</div>
        <a href="${p.url_proizvoda}" target="_blank" style="margin-top:auto; color:var(--gold); text-align:center; padding-top:10px; text-decoration:none; font-size:0.8rem;">DETALJNIJE →</a>
      </article>
    `).join('');
  }

  document.getElementById('q').oninput = () => render();
  document.getElementById('brandFilter').onchange = () => render();
  document.getElementById('typeFilter').onchange = () => render();
  init();
</script>
</body>
</html>
